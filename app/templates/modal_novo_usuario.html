<div class="modal-backdrop" onclick="if(event.target===this) document.getElementById('modal-container').innerHTML=''">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2 class="modal-title">Cadastrar Usuário</h2>
            <button class="icon-btn" onclick="document.getElementById('modal-container').innerHTML=''">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <form id="form-novo-usuario" hx-post="/admin/usuarios" hx-swap="none">
            <div class="modal-body">
                <div>
                    <label class="label">Nome completo *</label>
                    <input name="nome" type="text" class="input" placeholder="Ex: Ana Gerente" required autofocus>
                </div>
                <div>
                    <label class="label">Email *</label>
                    <input name="email" type="email" class="input" placeholder="ana@empresa.com" required>
                </div>
                <div>
                    <label class="label">Senha *</label>
                    <input name="senha" type="password" class="input" placeholder="Mínimo 6 caracteres" minlength="6" required>
                </div>
                <div>
                    <label class="label">Permissão</label>
                    <select name="role" class="input">
                        <option value="SALES">Vendedor — acesso ao pipeline</option>
                        <option value="MANAGER">Gerente — visão de equipe</option>
                        <option value="ADMIN">Admin — acesso total</option>
                    </select>
                </div>
                <div id="form-error" style="display:none; background:#FCE8E6; color:#9B1F12; border:1px solid #F2C2BD; padding:8px 12px; border-radius:var(--radius-sm); font-size:12.5px;"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary"
                        onclick="document.getElementById('modal-container').innerHTML=''">
                    Cancelar
                </button>
                <button type="submit" class="btn btn-primary">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
                    Cadastrar
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    (function() {
        var form = document.getElementById('form-novo-usuario');
        var errBox = document.getElementById('form-error');
        form.addEventListener('htmx:afterRequest', function(e) {
            if (e.detail.successful) {
                document.getElementById('modal-container').innerHTML = '';
                location.reload();
            } else {
                try {
                    var r = JSON.parse(e.detail.xhr.response);
                    errBox.textContent = r.detail || 'Erro ao cadastrar usuário.';
                } catch(_) {
                    errBox.textContent = 'Erro ao cadastrar usuário.';
                }
                errBox.style.display = 'block';
            }
        });
        document.addEventListener('keydown', function escHandler(e) {
            if (e.key === 'Escape') {
                document.getElementById('modal-container').innerHTML = '';
                document.removeEventListener('keydown', escHandler);
            }
        });
    })();
</script>
