<div class="modal-backdrop" onclick="if(event.target===this) document.getElementById('modal-container').innerHTML=''">
    <div class="modal-card" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h2 class="modal-title">Editar Lead</h2>
            <button class="icon-btn" onclick="document.getElementById('modal-container').innerHTML=''">
                <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <form id="form-editar-lead"
              hx-put="/ui/leads/{{ lead.id }}"
              hx-swap="none">
            <div class="modal-body">
                <div>
                    <label class="label">Nome *</label>
                    <input name="nome" type="text" class="input"
                           value="{{ lead.nome }}" required autofocus>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                    <div>
                        <label class="label">Telefone / WhatsApp</label>
                        <input name="telefone" type="text" class="input"
                               value="{{ lead.telefone or '' }}"
                               placeholder="5511999999999">
                        <div style="font-size:10.5px; color:var(--ink-400); margin-top:4px;">
                            Usado para envio via WhatsApp
                        </div>
                    </div>
                    <div>
                        <label class="label">Email</label>
                        <input name="email" type="email" class="input"
                               value="{{ lead.email_principal or '' }}"
                               placeholder="contato@empresa.com">
                    </div>
                </div>
                <div>
                    <label class="label">Origem do Lead</label>
                    <select name="origem" class="input">
                        <option value="">Selecione a origem…</option>
                        {% set origens = ['WhatsApp','Email','Indicação','Site','LinkedIn','Instagram','Cold Call','Feira / Evento','Outro'] %}
                        {% for o in origens %}
                        <option value="{{ o }}" {% if lead.origem == o %}selected{% endif %}>{{ o }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary"
                        onclick="document.getElementById('modal-container').innerHTML=''">
                    Cancelar
                </button>
                <button type="submit" class="btn btn-primary">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    Salvar alterações
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    (function() {
        document.getElementById('form-editar-lead').addEventListener('htmx:afterRequest', function(e) {
            if (e.detail.successful) {
                document.getElementById('modal-container').innerHTML = '';
                location.reload();
            }
        });
        document.addEventListener('keydown', function escHandler(e) {
            if (e.key === 'Escape') {
                document.getElementById('modal-container').innerHTML = '';
                document.removeEventListener('keydown', escHandler);
            }
        });
    })();
</script>
