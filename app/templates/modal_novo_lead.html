<div class="modal-backdrop" onclick="document.getElementById('modal-container').innerHTML=''"></div>
<div class="modal-card">
    <div class="modal-header">
        <h2 class="modal-title">Novo Lead</h2>
        <button class="icon-btn" onclick="document.getElementById('modal-container').innerHTML=''">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>

    <form id="form-novo-lead" hx-post="/ui/leads" hx-swap="none">
        <div class="modal-body">
            <div>
                <label class="label">Nome *</label>
                <input name="nome" type="text" class="input" placeholder="Ex: Maria Silva" required autofocus>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div>
                    <label class="label">Telefone / WhatsApp</label>
                    <input name="telefone" type="text" class="input" placeholder="5511999999999">
                </div>
                <div>
                    <label class="label">Email</label>
                    <input name="email" type="email" class="input" placeholder="maria@empresa.com">
                </div>
            </div>
            <div>
                <label class="label">Origem do Lead</label>
                <select name="origem" class="input">
                    <option value="">Selecione a origem…</option>
                    <option value="WhatsApp">WhatsApp</option>
                    <option value="Email">Email</option>
                    <option value="Indicação">Indicação</option>
                    <option value="Site">Site</option>
                    <option value="LinkedIn">LinkedIn</option>
                    <option value="Instagram">Instagram</option>
                    <option value="Cold Call">Cold Call</option>
                    <option value="Feira / Evento">Feira / Evento</option>
                    <option value="Outro">Outro</option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" onclick="document.getElementById('modal-container').innerHTML=''">
                Cancelar
            </button>
            <button type="submit" class="btn btn-primary">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M12 4v16m8-8H4"/></svg>
                Criar lead
            </button>
        </div>
    </form>
</div>

<script>
    (function() {
        document.getElementById('form-novo-lead').addEventListener('htmx:afterRequest', function(e) {
            if (e.detail.successful) {
                document.getElementById('modal-container').innerHTML = '';
                location.reload();
            }
        });
        document.addEventListener('keydown', function escHandler(e) {
            if (e.key === 'Escape') {
                document.getElementById('modal-container').innerHTML = '';
                document.removeEventListener('keydown', escHandler);
            }
        });
    })();
</script>
