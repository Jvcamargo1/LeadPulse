<div id="modal-backdrop" class="modal-backdrop" onclick="if(event.target===this) this.remove()">
    <div class="modal-card">
        <div class="modal-header">
            <h3 class="modal-title">Nova oportunidade</h3>
            <button type="button" class="icon-btn" onclick="document.getElementById('modal-backdrop').remove()">
                <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>

        <form hx-post="/ui/oportunidades">
            <div class="modal-body">
                <div>
                    <label class="label">Lead associado</label>
                    <select name="lead_id" required class="input">
                        <option value="" disabled selected>Selecione um lead</option>
                        {% for lead in leads %}
                        <option value="{{ lead.id }}">{{ lead.nome }}{% if lead.email_principal %} · {{ lead.email_principal }}{% endif %}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="label">Valor estimado (R$)</label>
                    <input class="input" type="number" step="0.01" name="valor" required placeholder="Ex: 5.000,00">
                </div>

                <div>
                    <label class="label">Estágio inicial</label>
                    <select name="estagio_funil" class="input">
                        <option value="Prospecção" selected>Prospecção</option>
                        <option value="Qualificação">Qualificação</option>
                        <option value="Proposta">Proposta</option>
                        <option value="Negociação">Negociação</option>
                    </select>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-ghost" onclick="document.getElementById('modal-backdrop').remove()">Cancelar</button>
                <button type="submit" class="btn btn-primary">Criar oportunidade</button>
            </div>
        </form>
    </div>
</div>
