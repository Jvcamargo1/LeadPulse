<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LeadPulse{% endblock %}</title>
    
    <!-- Tailwind CSS (via CDN para o MVP, em produção usaremos o build) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- HTMX para reatividade SSR -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Sortable.js para Drag and Drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body class="bg-white text-gray-800 font-sans antialiased h-screen flex flex-col">
    <main class="flex-1 p-6 overflow-hidden bg-gray-50">
        <!-- O conteúdo do kanban.html será injetado aqui -->
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
