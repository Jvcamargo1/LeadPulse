<div id="modal-backdrop" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex justify-center items-center z-50">
    <div class="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden">
         
        <!-- Header do Modal -->
        <div class="p-4 border-b border-gray-200 flex justify-between items-center">
            <h3 class="text-lg font-bold text-gray-900">Nova Oportunidade</h3>
            <!-- O botão de fechar apenas remove o HTML do backdrop da tela -->
            <button type="button" onclick="document.getElementById('modal-backdrop').remove()" class="text-gray-400 hover:text-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <!-- Formulário integrado com HTMX -->
        <form hx-post="/ui/oportunidades" class="p-4 space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Lead Associado</label>
                <select name="lead_id" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    <option value="" disabled selected>Selecione um Lead</option>
                    {% for lead in leads %}
                    <option value="{{ lead.id }}">{{ lead.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Valor Estimado (R$)</label>
                <input type="number" step="0.01" name="valor" required class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" placeholder="Ex: 5000.00">
            </div>
            
            <div class="mt-6 flex justify-end gap-3 pt-4 border-t border-gray-100">
                <button type="button" onclick="document.getElementById('modal-backdrop').remove()" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg font-medium transition-colors">
                    Cancelar
                </button>
                <button type="submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-medium transition-colors">
                    Criar Oportunidade
                </button>
            </div>
        </form>
    </div>
</div>
