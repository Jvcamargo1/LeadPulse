<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LeadPulse{% endblock %}</title>
    <!-- Tailwind CSS (CDN para MVP) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX para interatividade no frontend -->
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">
    <!-- Navbar superior -->
    <nav class="bg-indigo-600 text-white shadow-md">
        <div class="container mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <h1 class="text-2xl font-bold tracking-tight">LeadPulse</h1>
                <span class="bg-indigo-700 text-indigo-100 text-xs px-2 py-1 rounded-full font-semibold border border-indigo-500">
                    SaaS Edition
                </span>
            </div>
            <div class="flex items-center space-x-4">
                <div class="text-sm">
                    <span class="text-indigo-200">Tenant logado:</span>
                    <span class="font-mono bg-indigo-800 px-2 py-1 rounded ml-1">{{ tenant_id[:8] }}...</span>
                </div>
                <button class="bg-indigo-500 hover:bg-indigo-400 p-2 rounded-full transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Área principal -->
    <main class="container mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
